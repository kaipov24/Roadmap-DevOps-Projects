---
# tasks file for roles/base

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Upgrade installed packages
  ansible.builtin.apt:
    upgrade: safe

- name: Install basic utilities
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - unzip
      - git
      - fail2ban
    state: present

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true