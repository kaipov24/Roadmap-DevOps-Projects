services:
  api:
    build: .
    container_name: todo-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3000"
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/todo_api
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    container_name: todo-api-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
