name: Deploy Dockerized Service

on:
  push:
    branches:
      - main
    paths:
      - "Dockerized-Service/**"
      - ".github/workflows/deploy-dockerized-service.yml"
  workflow_dispatch:

env:
  CONTAINER_NAME: dockerized-service
  CONTAINER_PORT: "3000"
  HOST_PORT: "3000"

jobs:
  build-and-deploy:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/dockerized-service"
          echo "name=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: Dockerized-Service
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Deploy locally
        run: |
          docker pull "${{ steps.image.outputs.name }}:${{ github.sha }}"

          docker stop "${CONTAINER_NAME}" 2>/dev/null || true
          docker rm "${CONTAINER_NAME}" 2>/dev/null || true

          docker run -d \
            --name "${CONTAINER_NAME}" \
            --restart unless-stopped \
            -p "${HOST_PORT}:${CONTAINER_PORT}" \
            -e SECRET_MESSAGE="${{ secrets.SECRET_MESSAGE }}" \
            -e USERNAME="${{ secrets.BASIC_AUTH_USERNAME }}" \
            -e PASSWORD="${{ secrets.BASIC_AUTH_PASSWORD }}" \
            "${{ steps.image.outputs.name }}:${{ github.sha }}"
